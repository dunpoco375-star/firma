<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMB - Firma Remota</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; text-align: center; }
        #canvas { border: 2px dashed #0f4c81; width: 100%; height: 300px; touch-action: none; background: #fff; display: block; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 5px; color: white; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <h3>Dibuja tu firma:</h3>
    <canvas id="canvas"></canvas>
    <button class="btn" style="background:#d9534f;" onclick="limpiar()">LIMPIAR</button>
    <button class="btn" style="background:#28a745;" onclick="subirFirma()">GENERAR ENLACE DE FIRMA</button>
    <div id="resultado" style="margin-top:20px; word-break:break-all;"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        ctx.lineWidth = 3; ctx.lineCap = "round";

        let drawing = false;
        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: x - r.left, y: y - r.top };
        }

        canvas.onmousedown = (e) => { drawing=true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); };
        canvas.onmousemove = (e) => { if(drawing) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } };
        window.onmouseup = () => drawing = false;
        
        canvas.ontouchstart = (e) => { drawing=true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); e.preventDefault(); };
        canvas.ontouchmove = (e) => { if(drawing) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } e.preventDefault(); };

        function limpiar() { ctx.clearRect(0,0,canvas.width, canvas.height); }

        async function subirFirma() {
            const resDiv = document.getElementById('resultado');
            resDiv.innerText = "Subiendo...";
            const base64 = canvas.toDataURL().split(',')[1];
            const fd = new FormData();
            fd.append('image', base64);
            
            try {
                const r = await fetch('https://api.imgbb.com/1/upload?key=6d38e23927d091e4a5d3f23789a7428c', {method: 'POST', body: fd});
                const d = await r.json();
                resDiv.innerHTML = "Copia este link y pégalo en la minuta:<br><input type='text' value='" + d.data.url + "' style='width:100%; padding:10px; margin-top:5px;'>";
            } catch(e) { resDiv.innerText = "Error, intenta de nuevo."; }
        }
    </script>
</body>
</html>
