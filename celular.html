<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMB - Firma</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; text-align: center; background: #f4f4f4; }
        #canvas { border: 2px dashed #0f4c81; width: 100%; height: 300px; touch-action: none; background: #fff; display: block; border-radius: 8px; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; color: white; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        #resultado { margin-top: 20px; }
        textarea { width: 100%; height: 80px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; padding: 5px; font-size: 10px; }
    </style>
</head>
<body>
    <h3>Dibuja tu firma aquí:</h3>
    <canvas id="canvas"></canvas>
    
    <button class="btn" style="background:#d9534f;" onclick="limpiar()">BORRAR</button>
    <button class="btn" style="background:#28a745;" onclick="generarTexto()">GENERAR CÓDIGO</button>
    
    <div id="resultado"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; 
        canvas.height = canvas.offsetHeight;
        ctx.lineWidth = 3; 
        ctx.lineCap = "round";

        let drawing = false;
        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: x - r.left, y: y - r.top };
        }

        canvas.onmousedown = (e) => { drawing=true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); };
        canvas.onmousemove = (e) => { if(drawing) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } };
        window.onmouseup = () => drawing = false;
        
        canvas.ontouchstart = (e) => { drawing=true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); e.preventDefault(); };
        canvas.ontouchmove = (e) => { if(drawing) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } e.preventDefault(); };

        function limpiar() { ctx.clearRect(0,0,canvas.width, canvas.height); }

        function generarTexto() {
            const dataUrl = canvas.toDataURL('image/png');
            document.getElementById('resultado').innerHTML = 
                "Copia este código y pégalo en la PC:<br>" +
                "<textarea onclick='this.select()'>" + dataUrl + "</textarea>";
        }
    </script>
</body>
</html>
