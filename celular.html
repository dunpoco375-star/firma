<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firmar y Enviar</title>
    <style>
        body { text-align: center; font-family: Arial; padding: 20px; }
        canvas { border: 2px dashed #0f4c81; width: 100%; height: 300px; touch-action: none; background: white; }
        .btn { padding: 15px; margin: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; width: 90%; }
        #resultado { margin-top: 20px; word-break: break-all; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="btn" style="background:#d9534f;" onclick="limpiar()">LIMPIAR</button>
    <button class="btn" style="background:#28a745;" onclick="subirFirma()">GENERAR ENLACE DE FIRMA</button>
    <div id="resultado"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        ctx.lineWidth = 3;

        // [Tu lógica de dibujo igual que antes va aquí]
        let drawing = false;
        canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
        canvas.addEventListener('mousemove', (e) => { if(drawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
        window.addEventListener('mouseup', () => drawing = false);
        function limpiar() { ctx.clearRect(0,0,canvas.width, canvas.height); }

        async function subirFirma() {
            const dataUrl = canvas.toDataURL().split(',')[1];
            const formData = new FormData();
            formData.append('image', dataUrl);

            document.getElementById('resultado').innerText = "Subiendo...";
            
            // Subida a ImgBB
            const response = await fetch('https://api.imgbb.com/1/upload?key=6d38e23927d091e4a5d3f23789a7428c', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            document.getElementById('resultado').innerHTML = "Copia este link y pégalo en la minuta:<br><input type='text' value='" + data.data.url + "' style='width:100%;'>";
        }
    </script>
</body>
</html>
