<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMB - Firmar</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        #canvas { border: 2px dashed #0f4c81; width: 100%; height: 300px; touch-action: none; background: white; }
        .btn { padding: 15px; width: 100%; margin-top: 10px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h3>Firma aquí:</h3>
    <canvas id="canvas"></canvas>
    <button class="btn" style="background:#d9534f;" onclick="limpiar()">LIMPIAR</button>
    <button class="btn" style="background:#28a745;" onclick="subirFirma()">ENVIAR FIRMA A MINUTA</button>
    <div id="resultado" style="margin-top:20px;"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        ctx.lineWidth = 3;

        let drawing = false;
        canvas.ontouchstart = (e) => { drawing=true; ctx.beginPath(); ctx.moveTo(e.touches[0].clientX - canvas.offsetLeft, e.touches[0].clientY - canvas.offsetTop); e.preventDefault(); };
        canvas.ontouchmove = (e) => { if(drawing) { ctx.lineTo(e.touches[0].clientX - canvas.offsetLeft, e.touches[0].clientY - canvas.offsetTop); ctx.stroke(); } };
        
        function limpiar() { ctx.clearRect(0,0,canvas.width, canvas.height); }

        async function subirFirma() {
            document.getElementById('resultado').innerText = "Procesando...";
            const base64 = canvas.toDataURL('image/png').split(',')[1];
            
            // Usamos un formulario simple para asegurar compatibilidad
            const formData = new FormData();
            formData.append('image', base64);
            
            try {
                const response = await fetch('https://api.imgbb.com/1/upload?key=6d38e23927d091e4a5d3f23789a7428c', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if(data.success) {
                    document.getElementById('resultado').innerHTML = "Copia este link:<br><input type='text' id='link' value='" + data.data.url + "' style='width:100%; padding:10px;'>";
                } else {
                    document.getElementById('resultado').innerText = "Error: " + data.status_txt;
                }
            } catch(e) {
                document.getElementById('resultado').innerText = "Error al conectar. Verifica tu conexión.";
            }
        }
    </script>
</body>
</html>
