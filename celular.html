<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMB - Firmar</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; text-align: center; overflow: hidden; }
        /* Esto es lo más importante: evitar que el celular mueva la página al intentar firmar */
        #canvas { 
            border: 2px dashed #0f4c81; 
            width: 100%; 
            height: 300px; 
            touch-action: none; 
            background: #fff; 
            display: block;
        }
        .btn { padding: 15px; margin: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; width: 90%; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <button class="btn" style="background:#d9534f;" onclick="limpiar()">LIMPIAR</button>
    <button class="btn" style="background:#28a745;" onclick="subirFirma()">GENERAR ENLACE DE FIRMA</button>
    <div id="resultado" style="margin-top:20px;"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Ajuste de resolución para que no se vea borroso
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.lineWidth = 3;
            ctx.lineCap = "round";
        }
        window.onload = resizeCanvas;

        let drawing = false;

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            // Soporte para Mouse y Touch
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        // Eventos
        canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); });
        canvas.addEventListener('mousemove', (e) => { if(drawing) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } });
        window.addEventListener('mouseup', () => drawing = false);

        canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { if(drawing) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } e.preventDefault(); }, {passive: false});

        function limpiar() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        async function subirFirma() {
            const dataUrl = canvas.toDataURL().split(',')[1];
            const formData = new FormData();
            formData.append('image', dataUrl);

            document.getElementById('resultado').innerText = "Subiendo...";
            
            const response = await fetch('https://api.imgbb.com/1/upload?key=6d38e23927d091e4a5d3f23789a7428c', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            document.getElementById('resultado').innerHTML = "Copia este link y pégalo en la minuta:<br><input type='text' value='" + data.data.url + "' style='width:100%; padding:10px; margin-top:5px;'>";
        }
    </script>
</body>
</html>
