<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMB - Firma</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; text-align: center; background: #f4f4f4; }
        #canvas { border: 2px dashed #0f4c81; width: 100%; height: 300px; touch-action: none; background: #fff; display: block; border-radius: 8px; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; color: white; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        #resultado { margin-top: 20px; font-weight: bold; color: #0f4c81; }
    </style>
</head>
<body>
    <h3>Dibuja tu firma aquí:</h3>
    <canvas id="canvas"></canvas>
    
    <button class="btn" style="background:#d9534f;" onclick="limpiar()">BORRAR</button>
    <button class="btn" style="background:#28a745;" onclick="copiarAlPortapapeles()">GENERAR Y COPIAR CÓDIGO</button>
    
    <div id="resultado"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; 
        canvas.height = canvas.offsetHeight;
        ctx.lineWidth = 3; 
        ctx.lineCap = "round";

        let drawing = false;
        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: x - r.left, y: y - r.top };
        }

        // Eventos para dibujo
        canvas.onmousedown = (e) => { drawing=true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); };
        canvas.onmousemove = (e) => { if(drawing) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } };
        window.onmouseup = () => drawing = false;
        canvas.ontouchstart = (e) => { drawing=true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); e.preventDefault(); };
        canvas.ontouchmove = (e) => { if(drawing) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } e.preventDefault(); };

        function limpiar() { ctx.clearRect(0,0,canvas.width, canvas.height); document.getElementById('resultado').innerText = ""; }

        // NUEVA FUNCIÓN DE COPIADO AUTOMÁTICO
        async function copiarAlPortapapeles() {
            const dataUrl = canvas.toDataURL('image/png');
            const resDiv = document.getElementById('resultado');
            
            try {
                await navigator.clipboard.writeText(dataUrl);
                resDiv.innerText = "✅ ¡CÓDIGO COPIADO AL PORTAPAPELES! YA PUEDES PEGARLO EN LA PC.";
                resDiv.style.color = "#28a745";
            } catch (err) {
                resDiv.innerText = "❌ Error al copiar. Revisa los permisos de tu navegador.";
                resDiv.style.color = "#d9534f";
            }
        }
    </script>
</body>
</html>
