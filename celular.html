<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMB - Firma Remota</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; text-align: center; }
        #sigCanvas { border: 2px dashed #0f4c81; background: #fff; width: 100%; height: 300px; touch-action: none; }
        .btn-container { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .btn { padding: 15px 25px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; flex: 1; }
    </style>
</head>
<body>

    <h3>Dibuja tu firma aquí:</h3>
    <canvas id="sigCanvas"></canvas>
    
    <div class="btn-container">
        <button class="btn" style="background:#d9534f;" onclick="limpiar()">LIMPIAR</button>
        <button class="btn" style="background:#28a745;" onclick="descargar()">DESCARGAR FIRMA</button>
    </div>

    <script>
        const canvas = document.getElementById('sigCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        // Configuración inicial
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.lineWidth = 3;
        ctx.lineCap = "round";

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); });
        canvas.addEventListener('mousemove', (e) => { if (drawing) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } });
        window.addEventListener('mouseup', () => drawing = false);
        
        canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); e.preventDefault(); }, {passive:false});
        canvas.addEventListener('touchmove', (e) => { if (drawing) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } e.preventDefault(); }, {passive:false});

        function limpiar() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        
        function descargar() {
            const link = document.createElement('a');
            link.download = 'firma_usuario.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
